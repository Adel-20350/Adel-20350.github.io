<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Form Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      border: 2px solid black;
      padding: 25px;
      width: 300px;
      background: white;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #000;
      border-radius: 5px;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: white;
      border: 2px solid black;
      cursor: pointer;
      font-weight: bold;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-box {
      background: white;
      padding: 20px;
      border: 2px solid black;
      width: 250px;
      text-align: center;
      border-radius: 10px;
    }

    .modal-box button {
      margin-top: 15px;
      width: 60px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Login</h2>

    <label>Username</label>
    <input type="text" id="username">

    <label>Password</label>
    <input type="password" id="password">

    <button onclick="login()">LOGIN</button>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <p id="message"></p>
      <button onclick="closeModal()">OK</button>
    </div>
  </div>

  <script>
    function login() {
      let user = document.getElementById("username").value;
      let pass = document.getElementById("password").value;

      let correctUser = "Adel";
      let correctPass = "51709";

      // if else + operator &&
      if (user === correctUser && pass === correctPass) {
        alert("Login Berhasil");
      } else {
        alert("Login Gagal");
      }
    }
  </script>

</body>
</html>
